<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gohan Calendar V1.2</title>

<style>
body{
  font-family:sans-serif;
  margin:20px;
  text-align:center;
  background:#fafafa;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
}

h2,h3{
  margin:15px;
}

input, textarea, button{
  width:90%;
  padding:12px;
  margin:6px;
  font-size:16px;
  box-sizing:border-box;
}

button{
  border-radius:20px;
  border:1px solid #ccc;
  background:white;
}

textarea{
  height:100px;
}

.hidden{
  display:none;
}

#calendarHeader{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  margin:10px;
}

#calendarHeader button{
  width:70px;
  white-space:nowrap;
}

#monthTitle{
  white-space:nowrap;
  font-size:22px;
}

#todayBtn{
  background:#fff3cd;
}  

#weekdays,
#calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

#weekdays div{
  font-weight:bold;
}

.day{
  height:55px;
  border:1px solid #ccc;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:white;
  border-radius:8px;
}

.day .check{
  position:absolute;
  bottom:2px;
  font-size:12px;
}

.hasData{
  background:#e8ffe8;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 2px 8px #ddd;
}
  
.today{
  border:3px solid #ff9800;
}

</style>
</head>

<body>

<div id="loginArea" class="card">
<h2>Gohan Calendar V1.2</h2>

<input id="email" placeholder="メールアドレス">

<input id="password"
type="password"
placeholder="パスワード">

<button id="login">ログイン</button>
<button id="signup">新規登録</button>

</div>


<div id="appArea" class="hidden">


<div id="calendarArea" class="card">

<button id="logout">ログアウト</button>

<div id="calendarHeader">

<button id="prevMonth">←</button>

<button id="todayBtn">今日</button>

<h2 id="monthTitle"></h2>

<button id="nextMonth">→</button>

</div>


<div id="weekdays">
<div>日</div>
<div>月</div>
<div>火</div>
<div>水</div>
<div>木</div>
<div>金</div>
<div>土</div>
</div>


<div id="calendar"></div>


</div>



<div id="noteArea" class="hidden card">

<h3 id="selectedDate"></h3>

<label>朝</label>
<textarea id="breakfast"></textarea>

<label>昼</label>
<textarea id="lunch"></textarea>

<label>夜</label>
<textarea id="dinner"></textarea>

<label>間食</label>
<textarea id="snack"></textarea>

<label>体重 kg</label>
<input id="weight" type="number">


<button id="save">保存</button>
<button id="back">戻る</button>


</div>


</div>


<script type="module">

const calendarArea=document.getElementById("calendarArea");
const noteArea=document.getElementById("noteArea");

const calendar=document.getElementById("calendar");
const monthTitle=document.getElementById("monthTitle");

const breakfast=document.getElementById("breakfast");
const lunch=document.getElementById("lunch");
const dinner=document.getElementById("dinner");
const snack=document.getElementById("snack");
const weight=document.getElementById("weight");

const email=document.getElementById("email");
const password=document.getElementById("password");

const save=document.getElementById("save");
const back=document.getElementById("back");
const login=document.getElementById("login");
const signup=document.getElementById("signup");
const logout=document.getElementById("logout");

const prevMonth=document.getElementById("prevMonth");
const nextMonth=document.getElementById("nextMonth");
const todayBtn=document.getElementById("todayBtn");

import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {
getFirestore,
doc,
setDoc,
getDoc,
getDocs,
collection
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSyAkjXWaJzIxyR9NpyRWMnNgBO-GW3xDnoA",
authDomain:"diet-calendar-9bda7.firebaseapp.com",
projectId:"diet-calendar-9bda7",
storageBucket:"diet-calendar-9bda7.firebasestorage.app",
messagingSenderId:"1062223846338",
appId:"1:1062223846338:web:65ac212970cc4314ca545b"
};


const app=initializeApp(firebaseConfig);

const auth=getAuth(app);
const db=getFirestore(app);


let currentUser=null;
let selectedDate="";
let currentDate=new Date();
let loadingCalendar=false;


onAuthStateChanged(auth,(user)=>{

if(user){

currentUser=user;

loginArea.classList.add("hidden");
appArea.classList.remove("hidden");

showCalendar();

}else{

loginArea.classList.remove("hidden");
appArea.classList.add("hidden");

}

});



signup.onclick=async()=>{

await createUserWithEmailAndPassword(
auth,
email.value,
password.value
);

alert("登録しました");

};



login.onclick=async()=>{

await signInWithEmailAndPassword(
auth,
email.value,
password.value
);

};



logout.onclick=()=>{

signOut(auth);

};


prevMonth.onclick=async()=>{

if(loadingCalendar)return;

loadingCalendar=true;


currentDate.setMonth(
currentDate.getMonth()-1
);
await showCalendar();


loadingCalendar=false;

};



nextMonth.onclick=async()=>{

if(loadingCalendar)return;

loadingCalendar=true;


currentDate.setMonth(
currentDate.getMonth()+1
);


await showCalendar();


loadingCalendar=false;

};

todayBtn.onclick=()=>{

currentDate=new Date();

showCalendar();

};

async function showCalendar(){


const year=currentDate.getFullYear();

const month=currentDate.getMonth();


monthTitle.textContent=
`${year}年${month+1}月`;


calendar.innerHTML="";


const snap=
await getDocs(
collection(
db,
"users",
currentUser.uid,
"records"
)
);


let savedDays=[];


snap.forEach((x)=>{

savedDays.push(x.id);

});



const firstDay=
new Date(year,month,1).getDay();


const days=
new Date(year,month+1,0).getDate();



for(let i=0;i<firstDay;i++){

const blank=document.createElement("div");

calendar.appendChild(blank);

}



for(let i=1;i<=days;i++){


let d=
`${year}-${String(month+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;


let div=document.createElement("div");

div.className="day";
  
const today = new Date();

const todayStr =
`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;


if(d === todayStr){

div.classList.add("today");

}

div.innerHTML=
`<span>${i}</span>`;


if(savedDays.includes(d)){

div.innerHTML+=
`<span class="check">✅</span>`;

div.classList.add("hasData");

}


div.onclick=()=>{

openNote(d);

};


calendar.appendChild(div);


}

}



async function openNote(date){


selectedDate=date;


breakfast.value="";
lunch.value="";
dinner.value="";
snack.value="";
weight.value="";


calendarArea.classList.add("hidden");
noteArea.classList.remove("hidden");


document.getElementById("selectedDate")
.textContent=date;


const snap=
await getDoc(
doc(
db,
"users",
currentUser.uid,
"records",
date
)
);


if(snap.exists()){

const data=snap.data();

breakfast.value=data.breakfast || "";
lunch.value=data.lunch || "";
dinner.value=data.dinner || "";
snack.value=data.snack || "";
weight.value=data.weight || "";

}

}




back.onclick=()=>{

noteArea.classList.add("hidden");

calendarArea.classList.remove("hidden");

};



save.onclick=async()=>{


await setDoc(

doc(
db,
"users",
currentUser.uid,
"records",
selectedDate
),

{

breakfast:breakfast.value,
lunch:lunch.value,
dinner:dinner.value,
snack:snack.value,
weight:Number(weight.value),
updated:new Date()

}

);


alert("保存しました");


calendarArea.classList.remove("hidden");
noteArea.classList.add("hidden");

showCalendar();


};


</script>

</body>
</html>
