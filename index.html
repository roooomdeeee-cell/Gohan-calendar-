<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shokuji Calendar</title>
<style>
body{
  font-family:sans-serif;
  margin:20px;
  text-align:center;
}
input, textarea, button{
  width:90%;
  padding:12px;
  margin:6px;
  font-size:16px;
}
textarea{
  height:120px;
}
#calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}
.day{
  border:1px solid #ccc;
  padding:15px 5px;
  cursor:pointer;
}
.hasData{
  background:#e8ffe8;
}
.hidden{
  display:none;
}
</style>
</head>
<body>
<div id="loginArea">
<h2>Gohan Calendar V1.41</h2>
<input id="email" placeholder="メールアドレス">
<input id="password" 
type="password" 
placeholder="パスワード">
<button id="login">
ログイン
</button>
<button id="signup">
新規登録
</button>
</div>
<div id="appArea" class="hidden">
<!-- カレンダー画面 -->

<div id="calendarArea">

<h2 id="monthTitle"></h2>

<div id="calendar"></div>

</div>

<!-- ノート画面 -->

<div id="noteArea" class="hidden">

<h3 id="selectedDate"></h3>

<label>朝</label>

<textarea id="breakfast"></textarea>

<label>昼</label>

<textarea id="lunch"></textarea>

<label>夜</label>

<textarea id="dinner"></textarea>

<label>間食</label>

<textarea id="snack"></textarea>

<label>体重 kg</label>

<input id="weight" type="number">

<button id="save">

保存

</button>

<button id="back">

戻る

</button>

</div>

</div>
<script type="module">
const calendarArea =

document.getElementById("calendarArea");

const breakfast =

document.getElementById("breakfast");

const lunch =

document.getElementById("lunch");

const dinner =

document.getElementById("dinner");

const snack =

document.getElementById("snack");

const back =

document.getElementById("back");
const loginArea = document.getElementById("loginArea");
const appArea = document.getElementById("appArea");
const monthTitle = document.getElementById("monthTitle");
const calendar = document.getElementById("calendar");
const noteArea = document.getElementById("noteArea");
const memo = document.getElementById("memo");
const weight = document.getElementById("weight");
const email = document.getElementById("email");
const password = document.getElementById("password");
const save = document.getElementById("save");
const logout = document.getElementById("logout");
const login = document.getElementById("login");
const signup = document.getElementById("signup");
import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
getFirestore,
doc,
setDoc,
getDocs,
collection
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {

getDoc

} from 

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase設定
const firebaseConfig = {
apiKey: "AIzaSyAkjXWaJzIxyR9NpyRWMnNgBO-GW3xDnoA",
authDomain: "diet-calendar-9bda7.firebaseapp.com",
projectId: "diet-calendar-9bda7",
storageBucket: "diet-calendar-9bda7.firebasestorage.app",
messagingSenderId:"1062223846338",
appId:"1:1062223846338:web:65ac212970cc4314ca545b"
};
const app = initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
let currentUser=null;
let selectedDate="";

// ログイン状態確認
onAuthStateChanged(auth,(user)=>{
if(user){
currentUser=user;
loginArea.classList.add("hidden");
appArea.classList.remove("hidden");
showCalendar();
}else{
loginArea.classList.remove("hidden");
appArea.classList.add("hidden");
}
});

// 新規登録
signup.onclick=async()=>{
await createUserWithEmailAndPassword(
auth,
email.value,
password.value
)
alert("登録しました");
};

// ログイン
login.onclick=async()=>{
await signInWithEmailAndPassword(
auth,
email.value,
password.value
)
};

// ログアウト
logout.onclick=()=>{
signOut(auth);
};

// カレンダー作成
async function showCalendar(){

const now=new Date();

const year=now.getFullYear();

const month=now.getMonth();

monthTitle.textContent =

`${year}年${month+1}月`;

calendar.innerHTML="";

// ★ここで1回だけ取得

const snap =

await getDocs(

collection(

db,

"users",

currentUser.uid,

"records"

)

);

let savedDays=[];

snap.forEach((x)=>{

savedDays.push(x.id);

});

// カレンダー作成

const days =

new Date(year,month+1,0).getDate();

for(let i=1;i<=days;i++){

let d =

`${year}-${String(month+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;

let div=document.createElement("div");

div.className="day";

if(savedDays.includes(d)){

div.textContent=i+" ✅";

div.classList.add("hasData");

}else{

div.textContent=i;

}

div.onclick=()=>{

openNote(d);

};

calendar.appendChild(div);

}

}

// ノート表示
async function openNote(date){

selectedDate=date;

calendarArea.classList.add("hidden");

noteArea.classList.remove("hidden");

document.getElementById("selectedDate")

.textContent=date;

// 保存済みデータ読み込み

const ref =

doc(

db,

"users",

currentUser.uid,

"records",

date

);

const snap =

await getDoc(ref);

if(snap.exists()){

const data=snap.data();

breakfast.value=data.breakfast || "";

lunch.value=data.lunch || "";

dinner.value=data.dinner || "";

snack.value=data.snack || "";

weight.value=data.weight || "";

}else{

breakfast.value="";

lunch.value="";

dinner.value="";

snack.value="";

weight.value="";

}

}

back.onclick=()=>{

noteArea.classList.add("hidden");

calendarArea.classList.remove("hidden");

showCalendar();

};
// 保存
document.getElementById("save").onclick = async()=>{

console.log("保存ボタン押された");

await setDoc(

doc(

db,

"users",

currentUser.uid,

"records",

selectedDate

),

{

breakfast: breakfast.value,

lunch:lunch.value,

dinner:dinner.value,

snack:snack.value,

weight:Number(weight.value),

updated:new Date()

}

);

alert("保存しました");

};

dinner:dinner.value,

snack:snack.value,

weight:Number(weight.value),

updated:new Date()
}
);
alert("保存しました");
showCalendar();
};
*/
</script>
</body>
</html>
