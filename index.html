<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gohan Calendar V1.3</title>

<style>
body{
  font-family:sans-serif;
  margin:20px;
  text-align:center;
  background:#fafafa;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
}

h2,h3{
  margin:15px;
}

input, textarea, button{
  width:90%;
  padding:12px;
  margin:6px;
  font-size:16px;
  box-sizing:border-box;
}

button{
  border-radius:20px;
  border:1px solid #ccc;
  background:white;
}

textarea{
  height:90px;
}

label{
  display:block;
  text-align:left;
  width:90%;
  margin:14px auto 4px;
  font-weight:bold;
}

.hidden{
  display:none;
}

#calendarHeader{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  margin:10px;
}

#calendarHeader button{
  width:70px;
  white-space:nowrap;
}

#monthTitle{
  white-space:nowrap;
  font-size:22px;
}

#todayBtn{
  background:#fff3cd;
}

#weekdays,
#calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

#weekdays div{
  font-weight:bold;
}

.day{
  height:55px;
  border:1px solid #ccc;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:white;
  border-radius:8px;
}

.day .check{
  position:absolute;
  bottom:2px;
  font-size:12px;
}

.hasData{
  background:#e8ffe8;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 2px 8px #ddd;
}

.today{
  border:3px solid #ff9800;
}

.mealBlock{
  width:95%;
  margin:14px auto;
  padding:10px;
  border-radius:15px;
  background:#fffaf2;
  border:1px solid #f1dfc2;
}

.photoInput{
  display:none;
}

.photoButtons{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}

.photoButtons button{
  width:42%;
  margin:5px;
}

.preview{
  max-width:90%;
  max-height:180px;
  border-radius:12px;
  margin:8px auto;
  display:block;
}

.smallNote{
  font-size:12px;
  color:#777;
  margin:4px;
}

</style>
</head>

<body>

<div id="loginArea" class="card">
<h2>Gohan Calendar V1.3</h2>

<input id="email" placeholder="メールアドレス">

<input id="password"
type="password"
placeholder="パスワード">

<button id="login">ログイン</button>
<button id="signup">新規登録</button>

</div>


<div id="appArea" class="hidden">


<div id="calendarArea" class="card">

<button id="logout">ログアウト</button>

<div id="calendarHeader">

<button id="prevMonth">←</button>

<button id="todayBtn">今日</button>

<h2 id="monthTitle"></h2>

<button id="nextMonth">→</button>

</div>


<div id="weekdays">
<div>日</div>
<div>月</div>
<div>火</div>
<div>水</div>
<div>木</div>
<div>金</div>
<div>土</div>
</div>


<div id="calendar"></div>


</div>



<div id="noteArea" class="hidden card">

<h3 id="selectedDate"></h3>

<div class="mealBlock">
<label>朝</label>
<textarea id="breakfastText" placeholder="朝ごはんメモ"></textarea>
<input id="breakfastPhotoInput" class="photoInput" type="file" accept="image/*">
<img id="breakfastPreview" class="preview hidden">
<div class="photoButtons">
<button id="breakfastPhotoBtn">写真追加</button>
<button id="breakfastRemoveBtn">写真削除</button>
</div>
</div>

<div class="mealBlock">
<label>昼</label>
<textarea id="lunchText" placeholder="昼ごはんメモ"></textarea>
<input id="lunchPhotoInput" class="photoInput" type="file" accept="image/*">
<img id="lunchPreview" class="preview hidden">
<div class="photoButtons">
<button id="lunchPhotoBtn">写真追加</button>
<button id="lunchRemoveBtn">写真削除</button>
</div>
</div>

<div class="mealBlock">
<label>夜</label>
<textarea id="dinnerText" placeholder="夜ごはんメモ"></textarea>
<input id="dinnerPhotoInput" class="photoInput" type="file" accept="image/*">
<img id="dinnerPreview" class="preview hidden">
<div class="photoButtons">
<button id="dinnerPhotoBtn">写真追加</button>
<button id="dinnerRemoveBtn">写真削除</button>
</div>
</div>

<div class="mealBlock">
<label>間食</label>
<textarea id="snackText" placeholder="間食メモ"></textarea>
<input id="snackPhotoInput" class="photoInput" type="file" accept="image/*">
<img id="snackPreview" class="preview hidden">
<div class="photoButtons">
<button id="snackPhotoBtn">写真追加</button>
<button id="snackRemoveBtn">写真削除</button>
</div>
</div>

<label>体重 kg</label>
<input id="weight" type="number">

<p class="smallNote">写真は圧縮してFirestoreに保存します。1食1枚まで。</p>

<button id="save">保存</button>
<button id="back">戻る</button>


</div>


</div>


<script type="module">

const calendarArea=document.getElementById("calendarArea");
const noteArea=document.getElementById("noteArea");

const loginArea=document.getElementById("loginArea");
const appArea=document.getElementById("appArea");

const calendar=document.getElementById("calendar");
const monthTitle=document.getElementById("monthTitle");

const weight=document.getElementById("weight");

const email=document.getElementById("email");
const password=document.getElementById("password");

const save=document.getElementById("save");
const back=document.getElementById("back");
const login=document.getElementById("login");
const signup=document.getElementById("signup");
const logout=document.getElementById("logout");

const prevMonth=document.getElementById("prevMonth");
const nextMonth=document.getElementById("nextMonth");
const todayBtn=document.getElementById("todayBtn");

const mealKeys=["breakfast","lunch","dinner","snack"];

const meals={};

mealKeys.forEach((key)=>{

meals[key]={
text:document.getElementById(`${key}Text`),
photoInput:document.getElementById(`${key}PhotoInput`),
photoBtn:document.getElementById(`${key}PhotoBtn`),
removeBtn:document.getElementById(`${key}RemoveBtn`),
preview:document.getElementById(`${key}Preview`),
image:""
};

});


import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {
getFirestore,
doc,
setDoc,
getDoc,
getDocs,
collection,
query,
where,
documentId
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSyAkjXWaJzIxyR9NpyRWMnNgBO-GW3xDnoA",
authDomain:"diet-calendar-9bda7.firebaseapp.com",
projectId:"diet-calendar-9bda7",
storageBucket:"diet-calendar-9bda7.firebasestorage.app",
messagingSenderId:"1062223846338",
appId:"1:1062223846338:web:65ac212970cc4314ca545b"
};


const app=initializeApp(firebaseConfig);

const auth=getAuth(app);
const db=getFirestore(app);


let currentUser=null;
let selectedDate="";
let currentDate=new Date();
let loadingCalendar=false;



onAuthStateChanged(auth,(user)=>{

if(user){

currentUser=user;

loginArea.classList.add("hidden");
appArea.classList.remove("hidden");

showCalendar();

}else{

loginArea.classList.remove("hidden");
appArea.classList.add("hidden");

}

});



signup.onclick=async()=>{

await createUserWithEmailAndPassword(
auth,
email.value,
password.value
);

alert("登録しました");

};



login.onclick=async()=>{

await signInWithEmailAndPassword(
auth,
email.value,
password.value
);

};



logout.onclick=()=>{

signOut(auth);

};



prevMonth.onclick=async()=>{

if(loadingCalendar)return;

loadingCalendar=true;

currentDate.setMonth(
currentDate.getMonth()-1
);

await showCalendar();

loadingCalendar=false;

};



nextMonth.onclick=async()=>{

if(loadingCalendar)return;

loadingCalendar=true;

currentDate.setMonth(
currentDate.getMonth()+1
);

await showCalendar();

loadingCalendar=false;

};



todayBtn.onclick=async()=>{

if(loadingCalendar)return;

loadingCalendar=true;

currentDate=new Date();

await showCalendar();

loadingCalendar=false;

};



async function showCalendar(){


const year=currentDate.getFullYear();

const month=currentDate.getMonth();


monthTitle.textContent=
`${year}年${month+1}月`;


calendar.innerHTML="";


const monthStart=
`${year}-${String(month+1).padStart(2,"0")}-01`;

const monthEnd=
`${year}-${String(month+1).padStart(2,"0")}-31`;


// V1.3：カレンダーは summaries だけ読む
const snap=
await getDocs(
query(
collection(
db,
"users",
currentUser.uid,
"summaries"
),
where(documentId(),">=",monthStart),
where(documentId(),"<=",monthEnd)
)
);


let savedDays=[];


snap.forEach((x)=>{

savedDays.push(x.id);

});



const firstDay=
new Date(year,month,1).getDay();


const days=
new Date(year,month+1,0).getDate();



for(let i=0;i<firstDay;i++){

const blank=document.createElement("div");

calendar.appendChild(blank);

}



for(let i=1;i<=days;i++){


let d=
`${year}-${String(month+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;


let div=document.createElement("div");

div.className="day";


const today=new Date();

const todayStr=
`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;


if(d===todayStr){

div.classList.add("today");

}


div.innerHTML=
`<span>${i}</span>`;


if(savedDays.includes(d)){

div.innerHTML+=
`<span class="check">✅</span>`;

div.classList.add("hasData");

}


div.onclick=()=>{

openNote(d);

};


calendar.appendChild(div);


}

}



function clearNote(){

mealKeys.forEach((key)=>{

meals[key].text.value="";
meals[key].image="";
meals[key].preview.src="";
meals[key].preview.classList.add("hidden");

});

weight.value="";

}



function setMealData(key,data){

const meal=meals[key];

if(typeof data==="string"){

meal.text.value=data;
meal.image="";
meal.preview.src="";
meal.preview.classList.add("hidden");

return;

}

meal.text.value=data?.text || "";
meal.image=data?.image || "";

if(meal.image){

meal.preview.src=meal.image;
meal.preview.classList.remove("hidden");

}else{

meal.preview.src="";
meal.preview.classList.add("hidden");

}

}



async function openNote(date){


selectedDate=date;

clearNote();


calendarArea.classList.add("hidden");
noteArea.classList.remove("hidden");


document.getElementById("selectedDate")
.textContent=date;


// V1.3：ノート詳細は records の該当日だけ読む
const snap=
await getDoc(
doc(
db,
"users",
currentUser.uid,
"records",
date
)
);


if(snap.exists()){

const data=snap.data();

// 旧データ互換：文字列でも読み込める
setMealData("breakfast",data.breakfast);
setMealData("lunch",data.lunch);
setMealData("dinner",data.dinner);
setMealData("snack",data.snack);

weight.value=data.weight || "";

}

}



back.onclick=()=>{

noteArea.classList.add("hidden");

calendarArea.classList.remove("hidden");

};



function hasAnyData(){

if(weight.value !== "") return true;

return mealKeys.some((key)=>{

return meals[key].text.value.trim() !== "" || meals[key].image !== "";

});

}



save.onclick=async()=>{


const recordData={

breakfast:{
text:meals.breakfast.text.value,
image:meals.breakfast.image
},

lunch:{
text:meals.lunch.text.value,
image:meals.lunch.image
},

dinner:{
text:meals.dinner.text.value,
image:meals.dinner.image
},

snack:{
text:meals.snack.text.value,
image:meals.snack.image
},

weight: weight.value === "" ? "" : Number(weight.value),

updated:new Date()

};


await setDoc(

doc(
db,
"users",
currentUser.uid,
"records",
selectedDate
),

recordData

);


// V1.3：カレンダー用の軽いデータだけ summaries に保存
await setDoc(

doc(
db,
"users",
currentUser.uid,
"summaries",
selectedDate
),

{
hasData:hasAnyData(),
updated:new Date()
}

);


alert("保存しました");


calendarArea.classList.remove("hidden");
noteArea.classList.add("hidden");

showCalendar();


};



async function compressImage(file,maxWidth=900,quality=0.55){

return new Promise((resolve,reject)=>{

const reader=new FileReader();

reader.onload=(e)=>{

const img=new Image();

img.onload=()=>{

let width=img.width;
let height=img.height;

if(width>maxWidth){

height=Math.round(height*maxWidth/width);
width=maxWidth;

}

const canvas=document.createElement("canvas");

canvas.width=width;
canvas.height=height;

const ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,width,height);

const dataUrl=canvas.toDataURL("image/jpeg",quality);

resolve(dataUrl);

};

img.onerror=reject;

img.src=e.target.result;

};

reader.onerror=reject;

reader.readAsDataURL(file);

});

}



mealKeys.forEach((key)=>{

const meal=meals[key];

meal.photoBtn.onclick=()=>{

meal.photoInput.click();

};


meal.photoInput.onchange=async()=>{

const file=meal.photoInput.files[0];

if(!file)return;

const compressed=await compressImage(file);

meal.image=compressed;
meal.preview.src=compressed;
meal.preview.classList.remove("hidden");

meal.photoInput.value="";

};


meal.removeBtn.onclick=()=>{

meal.image="";
meal.preview.src="";
meal.preview.classList.add("hidden");

};

});


</script>

</body>
</html>
